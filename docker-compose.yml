version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aml_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aml
      POSTGRES_PASSWORD: aml_secret
      POSTGRES_DB: aml_detector
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aml -d aml_detector"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aml_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  detector:
    build:
      context: ./apps/detector
      dockerfile: Dockerfile
    container_name: aml_detector_service
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://aml:aml_secret@postgres:5432/aml_detector
      - REDIS_URL=redis://redis:6379
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
